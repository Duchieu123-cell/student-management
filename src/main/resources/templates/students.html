<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Quản Lý Sinh Viên</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h1>Danh Sách Sinh Viên</h1>
        <a th:href="@{/students/add}" class="btn btn-primary">Thêm Mới</a>
    </div>

    <form th:action="@{/students}" method="get" class="row g-2 mb-3">
        <div class="col-auto">
            <input type="text" name="keyword" class="form-control" placeholder="Tìm theo tên...">
        </div>
        <div class="col-auto">
            <button type="submit" class="btn btn-secondary">Tìm kiếm</button>
        </div>
    </form>

    <table class="table table-striped table-hover border">
        <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Họ và Tên</th>
                <th>Email</th>
                <th>Tuổi</th>
                <th>Thao tác</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="student : ${dsSinhVien}">
                <td th:text="${student.id}"></td>
                <td th:text="${student.name}"></td>
                <td th:text="${student.email}"></td>
                <td th:text="${student.age}"></td>
                <td>
                    <a th:href="@{/students/{id}(id=${student.id})}" class="btn btn-info btn-sm">Xem Chi Tiết</a>
                </td>
            </tr>
        </tbody>
    </table>
</body>
</html>
