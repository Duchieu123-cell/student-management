<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${pageTitle}"></title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">
    <div class="card shadow">
        <div class="card-header bg-primary text-white">
            <h2 th:text="${pageTitle}"></h2>
        </div>
        <div class="card-body">
            <form th:action="@{/students/save}" th:object="${student}" method="post">
                <div class="mb-3">
                    <label class="form-label">Mã Sinh Viên (ID):</label>
                    <input type="text" th:field="*{id}" class="form-control" required th:readonly="${student.id != null}">
                </div>
                <div class="mb-3">
                    <label class="form-label">Họ và Tên:</label>
                    <input type="text" th:field="*{name}" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Email:</label>
                    <input type="email" th:field="*{email}" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Tuổi:</label>
                    <input type="number" th:field="*{age}" class="form-control" min="18" required>
                </div>
                <div class="mt-4">
                    <button type="submit" class="btn btn-success">Lưu Lại</button>
                    <a th:href="@{/students}" class="btn btn-secondary">Hủy Bỏ</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
