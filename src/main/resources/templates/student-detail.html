<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Chi tiết sinh viên</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">
    <div class="card border-info shadow">
        <div class="card-header bg-info text-white">
            <h2>Thông tin chi tiết</h2>
        </div>
        <div class="card-body">
            <p><strong>ID:</strong> <span th:text="${student.id}"></span></p>
            <p><strong>Họ tên:</strong> <span th:text="${student.name}"></span></p>
            <p><strong>Email:</strong> <span th:text="${student.email}"></span></p>
            <p><strong>Tuổi:</strong> <span th:text="${student.age}"></span></p>
        </div>
        <div class="card-footer">
            <a th:href="@{/students/edit/{id}(id=${student.id})}" class="btn btn-warning">Chỉnh sửa</a>
            
            <a th:href="@{/students/delete/{id}(id=${student.id})}" 
               class="btn btn-danger" 
               onclick="return confirm('Bạn có chắc chắn muốn xóa sinh viên này không?')">
               Xóa sinh viên
            </a>
            
            <a th:href="@{/students}" class="btn btn-secondary">Quay lại danh sách</a>
        </div>
    </div>
</body>
</html>
